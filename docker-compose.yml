version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: wallet-db
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - wallet_postgres_data:/var/lib/postgresql/data

volumes:
  wallet_postgres_data: